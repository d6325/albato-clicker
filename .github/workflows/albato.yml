name: albato-clicker

on:
  schedule:
    - cron: '0 * * * *'     # запуск раз в час (UTC)
  workflow_dispatch: {}      # ручной запуск

concurrency:
  group: albato-clicker
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm i

      # Критично: скачать браузер Chromium и системные зависимости
      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run clicker (6 итераций по 10 минут)
        env:
          ALBATO_LOGIN: ${{ secrets.ALBATO_LOGIN }}
          ALBATO_PASSWORD: ${{ secrets.ALBATO_PASSWORD }}
          LOOPS: "6"
          SLEEP_MIN: "10"
        run: node clicker.js

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: artifacts/
