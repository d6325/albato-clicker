name: albato-clicker

on:
  schedule:
    - cron: '*/5 * * * *'     # запуск раз в 5 минут (UTC)
  workflow_dispatch: {}

concurrency:
  group: albato-clicker
  cancel-in-progress: false    # чтобы новый запуск ЖДАЛ, а не убивал старый

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 10        # максимум 10 минут на один запуск

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm i

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run clicker (1 итерация)
        env:
          ALBATO_LOGIN: ${{ secrets.ALBATO_LOGIN }}
          ALBATO_PASSWORD: ${{ secrets.ALBATO_PASSWORD }}
          LOOPS: "1"           # ← только ОДНО выполнение!
          SLEEP_MIN: "0"
        run: node clicker.js

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: artifacts/
